body:
  text: 楊朱第七楊朱遊於魯舍於孟氏孟氏問曰人而已矣奚以名為曰以名者為富既富矣奚不已焉曰為貴既貴矣奚不已焉曰為死既死矣奚為焉曰為子孫名奚益於子孫曰名乃苦其身燋其心乘其名者澤及宗族利兼鄉黨況子孫乎凡為名者必廉廉斯貧為名者必讓讓斯賤曰管仲之相齊也君淫亦淫君奢亦奢志合言從道行國霸死之後管氏而已田氏之相齊也君盈則己降君斂則己施民皆歸之因有齊國子孫享之至今不絶若實名貧偽名富曰實無名名無實名者偽而已矣昔者堯舜偽以天下讓許由善卷而不失天下享祚百年伯夷叔齊實以孤竹君讓而終亡其國餓死於首陽之山實偽之辨如此其省也楊朱曰百年壽之大齊得百年者千無一焉設有一者孩抱以逮昏老幾居其半矣夜眠之所弭晝覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中逌然而自得亡介焉之慮者亦亡一時之中爾則人之生也奚為哉奚樂哉為美厚爾為聲色爾而美厚復不可常猒足聲色不可常玩聞乃復為刑賞之所禁勸名法之所進退遑遑爾競一時之虛譽規死後之餘榮偊偊爾順耳目之觀聽惜身意之是非徒失當年之至樂不能自肆於一時重囚纍梏何以異哉太古之人知生之暫來知死之暫往故從心而動不違自然所好當身之娛非所去也故不為名所勸從性而遊不逆萬物所好死後之名非所取也故不為刑所及名譽先後年命多少非所量也楊朱曰萬物所異者生也所同者死也生則有賢愚貴賤是所異也死則有臭腐消滅是所同也雖然賢愚貴賤非所能也臭腐消滅亦非所能也故生非所生死非所死賢非所賢愚非所愚貴非所貴賤非所賤然而萬物齊生齊死齊賢齊愚齊貴齊賤十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則腐骨生則桀紂死則腐骨腐骨一矣孰知其異且趣當生奚遑死後楊朱曰伯夷非亡欲矜清之郵以放餓死展季非亡情矜貞之郵以放寡宗清貞之誤善之若此楊朱曰原憲窶於魯子貢殖於衛原憲之窶損生子貢之殖纍身然則窶亦不可殖亦不可其可焉在曰可在樂生可在逸身故善樂生者不窶善逸身者不殖楊朱曰古語有之生相憐死相捐此語至矣相憐之道非唯情也勤能使逸飢能使飽寒能使溫窮能使達也相捐之道非不相哀也不含珠玉不服文錦不陳犧牲不設明器也晏平仲問養生於管夷吾管夷吾曰肆之而已勿壅勿閼晏平仲曰其目奈何夷吾曰恣耳之所欲聽恣目之所欲視恣鼻之所欲向恣口之所欲言恣體之所欲安恣意之所欲行夫耳之所欲聞者音聲而不得聽謂之閼聰目之所欲見者美色而不得視謂之閼明鼻之所欲向者椒蘭而不得嗅謂之閼顫口之所欲道者是非而不得言謂之閼智體之所欲安者美厚而不得從謂之閼適意之所欲為者放逸而不得行謂之閼性凡此諸閼廢虐之主去廢虐之主熙熙然以俟死一日一月一年十年吾所謂養拘此廢虐之主録而不舍戚戚然以至久生百年千年萬年非吾所謂養管夷吾曰吾既告子養生矣送死奈何晏平仲曰送死略矣將何以告焉管夷吾曰吾固欲聞之平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可袞文繡裳而納諸石椁亦可唯所遇焉管夷吾顧謂鮑叔黃子曰生死之道吾二人進之矣子産相鄭專國之政三年善者服其化惡者畏其禁鄭國以治諸侯憚之而有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒千鐘積麴成封望門百步糟漿之氣逆於人鼻方其荒於酒也不知世道之安危人理之悔吝室內之有亡九族之親踈存亡之哀樂也雖水火兵刃交於前弗知也穆之後庭比房數十皆擇稚齒婑媠者以盈之方其聃於色也屏親昵絶交遊逃於後庭以晝足夜三月一出意猶未愜鄉有處子之娥姣者必賄而招之媒而挑之弗獲而後已子産日夜以為戚密造鄧析而謀之曰喬聞治身以及家治家以及國此言自於近至於遠也喬為國則治矣而家則亂矣其道逆邪將奚方以救二子子其詔之鄧析曰吾怪之久矣未敢先言子奚不時其治也喻以性命之重誘以禮義之尊乎子産用鄧析之言因間以謁其兄弟而告之曰人之所以貴於禽獸者智慮智慮之所將者禮義禮義成則名位至矣若觸情而動聃於嗜欲則性命危矣子納喬之言則朝自悔而夕食祿矣朝穆曰吾知之久矣擇之亦久矣豈待若言而後識之哉凡生之難遇而死之易及以難遇之生俟易及之死可孰念哉而欲尊禮義以夸人矯情性以招名吾以此為弗若死矣為欲盡一生之歡窮當年之樂唯患腹溢而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也且若以治國之能夸物欲以説辭亂我之心榮祿喜我之意不亦鄙而可憐哉我又欲與若別之夫善治外者物未必治而身交苦善治內者物未必亂而性交逸以若之治外其法可暫行於一國未合於人心以我之治內可推之於天下君臣之道息矣吾常欲以此術而喻之若反以彼術而教我哉子産忙然無以應之他日以告鄧析鄧析曰子與真人居而不知也孰謂子智者乎鄭國之治偶耳非子之功也衛端木叔者子貢之世也藉其先資家纍萬金不治世故放意所好其生民之所欲為人意之所欲玩者無不為也無不玩也牆屋臺榭園囿池沼飲食車服聲樂嬪御擬齊楚之君焉至其情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏國非齊土之所産育者無不必致之猶藩牆之物也及其遊也雖山川阻險塗徑修遠無不必之猶人之行咫步也賓客在庭者日百住庖廚之下不絶煙火堂廡之上不絶聲樂奉養之餘先散之宗族宗族之餘次散之邑里邑里之餘乃散之一國行年六十氣幹將衰棄其家事都散其庫藏珍寶車服妾媵一年之中盡焉不為子孫留財及其病也無藥石之儲及其死也無瘞埋之資一國之人受其施者相與賦而藏之反其子孫之財焉禽骨釐聞之曰端木叔狂人也辱其祖矣段干木聞之曰木叔達人也德過其祖矣其所行也其所為也聚意所經而誠理所取衛之君子多以禮教自持固未足以得此人之心也孟孫陽問楊子曰有人於此貴生愛身以蘄不死可乎曰理無不死以蘄久生可乎曰理無久生生非貴之所能存身非愛之所能厚且久生奚為五情好惡古猶今也四體安危古猶今也世事苦樂古猶今也變易治亂古猶今也既聞之矣既見之矣既更之矣百年猶厭其多況久生之苦也乎孟孫陽曰若然速亡愈於久生則踐鋒刃入湯火得所志矣楊子曰不然既生則廢而任之究其所欲以俟於死將死則廢而任之究其所之以放於盡無不廢無不任何遽遲速於其間乎楊朱曰伯成子高不以一毫利物舍國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽孟孫陽曰子不達夫子之心吾請言之有侵若肌膚獲萬金者若為之乎曰為之孟孫陽曰有斷若一節得一國子為之乎禽子默然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之乎禽子曰吾不能所以答子然則以子之言問老聃關尹則子言當矣以吾言問大禹墨翟則吾言當矣孟孫陽因顧與其徒説他事楊朱曰天下之美歸之舜禹周孔天下之惡歸之桀紂然而舜耕於河陽陶於雷澤四體不得暫安口腹不得美厚父母之所不愛弟妹之所不親行年三十不告而娶及受堯之禪年已長智已衰商鈞不才禪位於禹戚戚然以至於死此天人之窮毒者也鯀治水土績用不就殛諸羽山禹纂業事讎惟荒土功子産不字過門不入身體偏枯手足胼胝及受舜禪卑宮室美紱冕戚戚然以至於死此天人之憂苦者也武王既終成王幼弱周公攝天子之政邵公不悅四國流言居東三年誅兄放弟僅免其身戚戚然以至於死此天人之危懼者也孔子明帝王之道應時君之聘伐樹於宋削迹於衛窮於商周圍於陳蔡受屈於季氏見辱於陽虎戚戚然以至於死此天民之遑遽者也凡彼四聖者生無一日之歡死有萬世之名名者固非實之所取也雖稱之弗知雖賞之不知與株塊無以異矣桀藉纍世之資居南面之尊智足以距群下威足以震海內恣耳目之所娛窮意慮之所為熙熙然以至於死此天民之逸蕩者也紂亦藉纍世之資居南面之尊威無不行志無不從肆情於傾宮縱欲於長夜不以禮義自苦熙熙然以至於誅此天民之放縱者也彼二凶也生有從欲之歡死被愚暴之名實者固非名之所與也雖毀之不知雖稱之弗知此與株塊奚以異矣彼四聖雖美之所歸苦以至終同歸於死矣彼二凶雖惡之所歸樂以至終亦同歸於死矣楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能藝而言治天下如運諸掌何也對曰君見其牧羊者乎百羊而群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣且臣聞之吞舟之魚不遊枝流鴻鵠高飛不集汙池何則其極遠也黃鐘大呂不可從煩奏之舞何則其音疏也將治大者不治細成大功者不成小此之謂矣楊朱曰太古之事滅矣孰志之哉三皇之事若存若亡五帝之事若覺若夢三王之事或隱或顯億不識一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀但伏羲已來三十餘萬歲賢愚好醜成敗是非無不消滅但遲速之間耳矜一時之毀譽以焦苦其神形要死後數百年中餘名豈足潤枯骨何生之樂哉楊朱曰人肖天地之貌懷五常之性有生之最靈者也人者爪牙不足以供守衛肌膚不足以自捍禦趨走不足以逃利害無毛羽以禦寒暑必將資物以為養性任智而不恃力故智之所貴存我為貴力之所賤侵物為賤然身非我有也既生不得不全之物非我有也既有不得而去之身固生之主物亦養之主雖全生身不可有其身雖不去物不可有其物有其物有其身是橫私天下之身橫私天下之物不橫私天下之身不橫私天下物者其唯聖人乎公天下之身公天下之物其唯至人矣此之謂至至者也楊朱曰生民之不得休息為四事故一為壽二為名三為位四為貨有此四者畏鬼畏人畏威畏刑此謂之遁民也可殺可活制命在外不逆命何羡壽不矜貴何羡名不要勢何羡位不貪富何羡貨此之謂順民也天下無對制命在內故語有之曰人不婚宦情欲失半人不衣食君臣道息周諺曰田父可坐殺晨出夜入自以性之恆啜菽茹藿自以味之極肌肉粗厚筋節腃急一朝處以柔毛綈幕薦以粱肉蘭橘心悁體煩內熱生病矣商魯之君與田父侔地則亦不盈一時而憊矣故野人之所安野人之所美謂天下無過者昔者宋國有田夫常衣縕黂僅以過冬暨春東作自曝於日不知天下之有廣廈隩室綿纊狐狢顧謂其妻曰負日之煊人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慚子此類也楊朱曰豐屋美服厚味姣色有此四者何求於外有此而求外者無猒之性無猒之性陰陽之蠹也忠不足以安君適足以危身義不足以利物適足以害生安上不由於忠而忠名滅焉利物不由於義而義名絶焉君臣皆安物我兼利古之道也鬻子曰去名者無憂老子曰名者實之賓而悠悠者趨名不已名固不可去名固不可賓邪今有名則尊榮亡名則卑辱尊榮則逸樂卑辱則憂苦憂苦犯性者也逸樂順性者也斯實之所係矣名胡可去名胡可賓但惡夫守名而纍實守名而纍實將恤危亡之不救豈徒逸樂憂苦之間哉
